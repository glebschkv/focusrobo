<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="128" height="128" shape-rendering="crispEdges">
  <!-- Chick pixel art -->
  <!-- Crest -->
  <rect x="14" y="3" width="2" height="2" fill="#FF9F43"/>
  <rect x="15" y="1" width="2" height="3" fill="#FF9F43"/>
  <!-- Head -->
  <rect x="9" y="5" width="14" height="12" rx="3" fill="#FFD93D"/>
  <!-- Eyes -->
  <rect x="12" y="9" width="2" height="2" fill="#3D2C2C"/>
  <rect x="18" y="9" width="2" height="2" fill="#3D2C2C"/>
  <!-- Beak -->
  <rect x="14" y="13" width="4" height="2" fill="#FF9F43"/>
  <rect x="15" y="15" width="2" height="1" fill="#FF9F43"/>
  <!-- Body -->
  <rect x="10" y="17" width="12" height="9" rx="2" fill="#FFD93D"/>
  <!-- Wings -->
  <rect x="7" y="19" width="3" height="4" fill="#FFC107" rx="1"/>
  <rect x="22" y="19" width="3" height="4" fill="#FFC107" rx="1"/>
  <!-- Feet -->
  <rect x="12" y="26" width="3" height="3" fill="#FF9F43"/>
  <rect x="17" y="26" width="3" height="3" fill="#FF9F43"/>
</svg>