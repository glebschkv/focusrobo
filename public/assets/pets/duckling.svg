<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="128" height="128" shape-rendering="crispEdges">
  <!-- Duckling pixel art -->
  <!-- Head -->
  <rect x="10" y="7" width="12" height="10" rx="3" fill="#FFE566"/>
  <!-- Eyes -->
  <rect x="13" y="10" width="2" height="2" fill="#3D2C2C"/>
  <rect x="19" y="10" width="2" height="2" fill="#3D2C2C"/>
  <!-- Bill -->
  <rect x="13" y="14" width="6" height="2" rx="1" fill="#FF9F43"/>
  <rect x="14" y="16" width="4" height="1" fill="#FF9F43"/>
  <!-- Body -->
  <rect x="9" y="17" width="14" height="9" rx="2" fill="#FFE566"/>
  <!-- Wings -->
  <rect x="6" y="19" width="3" height="4" rx="1" fill="#FFD93D"/>
  <rect x="23" y="19" width="3" height="4" rx="1" fill="#FFD93D"/>
  <!-- Feet -->
  <rect x="11" y="26" width="4" height="2" fill="#FF9F43"/>
  <rect x="17" y="26" width="4" height="2" fill="#FF9F43"/>
  <!-- Tail feather -->
  <rect x="21" y="17" width="2" height="2" fill="#FFD93D"/>
</svg>