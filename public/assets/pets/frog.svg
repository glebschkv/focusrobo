<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="128" height="128" shape-rendering="crispEdges">
  <!-- Frog pixel art -->
  <!-- Eyes (top) -->
  <rect x="8" y="4" width="6" height="6" rx="3" fill="#4ADE80"/>
  <rect x="18" y="4" width="6" height="6" rx="3" fill="#4ADE80"/>
  <rect x="10" y="5" width="3" height="3" fill="#FFFFFF"/>
  <rect x="20" y="5" width="3" height="3" fill="#FFFFFF"/>
  <rect x="11" y="6" width="2" height="2" fill="#1A1A2E"/>
  <rect x="21" y="6" width="2" height="2" fill="#1A1A2E"/>
  <!-- Head -->
  <rect x="7" y="9" width="18" height="8" rx="2" fill="#4ADE80"/>
  <!-- Mouth -->
  <rect x="12" y="14" width="8" height="1" fill="#2D8A4E"/>
  <!-- Body -->
  <rect x="9" y="17" width="14" height="8" rx="2" fill="#4ADE80"/>
  <!-- Belly -->
  <rect x="12" y="18" width="8" height="5" rx="1" fill="#86EFAC"/>
  <!-- Front legs -->
  <rect x="6" y="22" width="4" height="3" fill="#4ADE80"/>
  <rect x="22" y="22" width="4" height="3" fill="#4ADE80"/>
  <!-- Back legs -->
  <rect x="9" y="25" width="5" height="4" fill="#4ADE80"/>
  <rect x="18" y="25" width="5" height="4" fill="#4ADE80"/>
  <!-- Toes -->
  <rect x="8" y="28" width="2" height="2" fill="#22C55E"/>
  <rect x="14" y="28" width="2" height="2" fill="#22C55E"/>
  <rect x="18" y="28" width="2" height="2" fill="#22C55E"/>
  <rect x="22" y="28" width="2" height="2" fill="#22C55E"/>
</svg>