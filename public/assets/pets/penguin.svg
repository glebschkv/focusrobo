<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="128" height="128" shape-rendering="crispEdges">
  <!-- Penguin pixel art -->
  <!-- Head -->
  <rect x="8" y="4" width="16" height="12" rx="3" fill="#2C2C3A"/>
  <!-- Face -->
  <rect x="11" y="6" width="10" height="8" rx="2" fill="#FFFFFF"/>
  <!-- Eyes -->
  <rect x="12" y="8" width="2" height="2" fill="#1A1A2E"/>
  <rect x="18" y="8" width="2" height="2" fill="#1A1A2E"/>
  <!-- Beak -->
  <rect x="14" y="12" width="4" height="2" fill="#FF9F43"/>
  <rect x="15" y="14" width="2" height="1" fill="#FF9F43"/>
  <!-- Body -->
  <rect x="7" y="16" width="18" height="10" rx="2" fill="#2C2C3A"/>
  <!-- Belly -->
  <rect x="11" y="16" width="10" height="9" rx="2" fill="#FFFFFF"/>
  <!-- Wings/flippers -->
  <rect x="4" y="17" width="3" height="7" rx="1" fill="#2C2C3A"/>
  <rect x="25" y="17" width="3" height="7" rx="1" fill="#2C2C3A"/>
  <!-- Feet -->
  <rect x="10" y="26" width="5" height="3" fill="#FF9F43"/>
  <rect x="17" y="26" width="5" height="3" fill="#FF9F43"/>
</svg>