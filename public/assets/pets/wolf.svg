<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="128" height="128" shape-rendering="crispEdges">
  <!-- Wolf pixel art -->
  <!-- Ears -->
  <rect x="6" y="2" width="5" height="6" fill="#6B7280"/>
  <rect x="21" y="2" width="5" height="6" fill="#6B7280"/>
  <rect x="7" y="3" width="3" height="4" fill="#9CA3AF"/>
  <rect x="22" y="3" width="3" height="4" fill="#9CA3AF"/>
  <!-- Head -->
  <rect x="6" y="7" width="20" height="12" rx="2" fill="#6B7280"/>
  <!-- Face lighter area -->
  <rect x="10" y="9" width="12" height="9" rx="1" fill="#9CA3AF"/>
  <!-- Eyes -->
  <rect x="11" y="10" width="3" height="3" fill="#FFD93D"/>
  <rect x="18" y="10" width="3" height="3" fill="#FFD93D"/>
  <rect x="12" y="11" width="1" height="1" fill="#1A1A2E"/>
  <rect x="19" y="11" width="1" height="1" fill="#1A1A2E"/>
  <!-- Snout -->
  <rect x="12" y="14" width="8" height="4" rx="1" fill="#D1D5DB"/>
  <!-- Nose -->
  <rect x="14" y="14" width="4" height="2" fill="#1A1A2E"/>
  <!-- Mouth -->
  <rect x="15" y="17" width="2" height="1" fill="#6B7280"/>
  <!-- Body -->
  <rect x="8" y="19" width="16" height="8" rx="2" fill="#6B7280"/>
  <!-- Chest -->
  <rect x="12" y="19" width="8" height="5" fill="#D1D5DB"/>
  <!-- Feet -->
  <rect x="9" y="27" width="4" height="2" fill="#4B5563"/>
  <rect x="19" y="27" width="4" height="2" fill="#4B5563"/>
  <!-- Tail -->
  <rect x="24" y="20" width="4" height="2" rx="1" fill="#6B7280"/>
  <rect x="26" y="22" width="3" height="2" rx="1" fill="#9CA3AF"/>
</svg>