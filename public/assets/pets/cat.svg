<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="128" height="128" shape-rendering="crispEdges">
  <!-- Cat pixel art - orange tabby -->
  <!-- Ears -->
  <rect x="7" y="3" width="4" height="5" fill="#F97316"/>
  <rect x="21" y="3" width="4" height="5" fill="#F97316"/>
  <rect x="8" y="4" width="2" height="3" fill="#F5B0C3"/>
  <rect x="22" y="4" width="2" height="3" fill="#F5B0C3"/>
  <!-- Head -->
  <rect x="7" y="7" width="18" height="12" rx="2" fill="#F97316"/>
  <!-- Tabby stripes on head -->
  <rect x="10" y="7" width="2" height="3" fill="#D4610A"/>
  <rect x="15" y="7" width="2" height="4" fill="#D4610A"/>
  <rect x="20" y="7" width="2" height="3" fill="#D4610A"/>
  <!-- Eyes -->
  <rect x="11" y="11" width="3" height="3" fill="#4ADE80"/>
  <rect x="12" y="12" width="1" height="1" fill="#1A1A2E"/>
  <rect x="18" y="11" width="3" height="3" fill="#4ADE80"/>
  <rect x="19" y="12" width="1" height="1" fill="#1A1A2E"/>
  <!-- Nose -->
  <rect x="15" y="15" width="2" height="1" fill="#F5B0C3"/>
  <!-- Mouth -->
  <rect x="14" y="16" width="1" height="1" fill="#D4610A"/>
  <rect x="17" y="16" width="1" height="1" fill="#D4610A"/>
  <!-- Whiskers -->
  <rect x="5" y="14" width="4" height="1" fill="#E8C99A"/>
  <rect x="5" y="16" width="3" height="1" fill="#E8C99A"/>
  <rect x="23" y="14" width="4" height="1" fill="#E8C99A"/>
  <rect x="24" y="16" width="3" height="1" fill="#E8C99A"/>
  <!-- Body -->
  <rect x="9" y="19" width="14" height="8" rx="2" fill="#F97316"/>
  <!-- Tabby stripes on body -->
  <rect x="12" y="20" width="2" height="4" fill="#D4610A"/>
  <rect x="16" y="19" width="2" height="4" fill="#D4610A"/>
  <rect x="20" y="20" width="2" height="3" fill="#D4610A"/>
  <!-- Chest -->
  <rect x="13" y="24" width="6" height="3" fill="#FFD4A8"/>
  <!-- Feet -->
  <rect x="10" y="27" width="4" height="2" fill="#FFD4A8"/>
  <rect x="18" y="27" width="4" height="2" fill="#FFD4A8"/>
  <!-- Tail -->
  <rect x="23" y="20" width="3" height="2" rx="1" fill="#F97316"/>
  <rect x="25" y="22" width="3" height="2" rx="1" fill="#F97316"/>
  <rect x="26" y="24" width="2" height="2" fill="#D4610A"/>
</svg>