<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="128" height="128" shape-rendering="crispEdges">
  <!-- Sparrow pixel art -->
  <!-- Head -->
  <rect x="10" y="5" width="12" height="10" rx="2" fill="#A0785A"/>
  <!-- Crown -->
  <rect x="11" y="5" width="10" height="4" rx="1" fill="#8B6340"/>
  <!-- Eyes -->
  <rect x="13" y="9" width="2" height="2" fill="#1A1A2E"/>
  <rect x="19" y="9" width="2" height="2" fill="#1A1A2E"/>
  <!-- Beak -->
  <rect x="15" y="12" width="3" height="2" fill="#E8A04C"/>
  <rect x="16" y="14" width="1" height="1" fill="#E8A04C"/>
  <!-- Cheek patches -->
  <rect x="11" y="10" width="2" height="3" fill="#D4A574"/>
  <rect x="21" y="10" width="2" height="3" fill="#D4A574"/>
  <!-- Body -->
  <rect x="9" y="15" width="14" height="10" rx="2" fill="#D4A574"/>
  <!-- Chest -->
  <rect x="12" y="16" width="8" height="6" rx="1" fill="#F0DCC0"/>
  <!-- Wings -->
  <rect x="6" y="17" width="3" height="5" rx="1" fill="#8B6340"/>
  <rect x="23" y="17" width="3" height="5" rx="1" fill="#8B6340"/>
  <!-- Tail -->
  <rect x="14" y="25" width="4" height="3" fill="#8B6340"/>
  <!-- Feet -->
  <rect x="12" y="26" width="2" height="2" fill="#E8A04C"/>
  <rect x="18" y="26" width="2" height="2" fill="#E8A04C"/>
</svg>