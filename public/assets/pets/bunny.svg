<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="128" height="128" shape-rendering="crispEdges">
  <!-- Bunny pixel art -->
  <!-- Ears -->
  <rect x="10" y="2" width="2" height="6" fill="#F5B0C3"/>
  <rect x="20" y="2" width="2" height="6" fill="#F5B0C3"/>
  <rect x="9" y="3" width="1" height="5" fill="#FFFFFF"/>
  <rect x="12" y="3" width="1" height="5" fill="#FFFFFF"/>
  <rect x="19" y="3" width="1" height="5" fill="#FFFFFF"/>
  <rect x="22" y="3" width="1" height="5" fill="#FFFFFF"/>
  <!-- Head -->
  <rect x="8" y="8" width="16" height="12" rx="2" fill="#FFFFFF"/>
  <!-- Eyes -->
  <rect x="12" y="12" width="2" height="2" fill="#3D2C2C"/>
  <rect x="18" y="12" width="2" height="2" fill="#3D2C2C"/>
  <!-- Nose -->
  <rect x="15" y="15" width="2" height="1" fill="#F5B0C3"/>
  <!-- Cheeks -->
  <rect x="10" y="14" width="2" height="2" fill="#FFD4DE" opacity="0.6"/>
  <rect x="20" y="14" width="2" height="2" fill="#FFD4DE" opacity="0.6"/>
  <!-- Body -->
  <rect x="10" y="20" width="12" height="8" rx="2" fill="#FFFFFF"/>
  <!-- Feet -->
  <rect x="10" y="28" width="4" height="2" fill="#F5B0C3"/>
  <rect x="18" y="28" width="4" height="2" fill="#F5B0C3"/>
</svg>