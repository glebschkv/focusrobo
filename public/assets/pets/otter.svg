<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="128" height="128" shape-rendering="crispEdges">
  <!-- Otter pixel art -->
  <!-- Ears -->
  <rect x="8" y="5" width="3" height="3" rx="1" fill="#7A5230"/>
  <rect x="21" y="5" width="3" height="3" rx="1" fill="#7A5230"/>
  <!-- Head -->
  <rect x="7" y="7" width="18" height="12" rx="3" fill="#8B6340"/>
  <!-- Face -->
  <rect x="10" y="10" width="12" height="8" rx="2" fill="#E8C99A"/>
  <!-- Eyes -->
  <rect x="12" y="11" width="2" height="2" fill="#1A1A2E"/>
  <rect x="18" y="11" width="2" height="2" fill="#1A1A2E"/>
  <!-- Nose -->
  <rect x="14" y="14" width="4" height="2" rx="1" fill="#3D2C2C"/>
  <!-- Mouth -->
  <rect x="15" y="16" width="2" height="1" fill="#7A5230"/>
  <!-- Whisker dots -->
  <rect x="10" y="15" width="1" height="1" fill="#3D2C2C"/>
  <rect x="21" y="15" width="1" height="1" fill="#3D2C2C"/>
  <!-- Body -->
  <rect x="9" y="19" width="14" height="8" rx="2" fill="#8B6340"/>
  <!-- Belly -->
  <rect x="12" y="20" width="8" height="6" rx="1" fill="#E8C99A"/>
  <!-- Paws -->
  <rect x="10" y="27" width="4" height="2" fill="#7A5230"/>
  <rect x="18" y="27" width="4" height="2" fill="#7A5230"/>
  <!-- Tail -->
  <rect x="23" y="22" width="5" height="2" rx="1" fill="#8B6340"/>
  <rect x="26" y="24" width="3" height="2" rx="1" fill="#8B6340"/>
</svg>