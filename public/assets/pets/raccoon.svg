<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="128" height="128" shape-rendering="crispEdges">
  <!-- Raccoon pixel art -->
  <!-- Ears -->
  <rect x="7" y="3" width="4" height="5" fill="#808080"/>
  <rect x="21" y="3" width="4" height="5" fill="#808080"/>
  <rect x="8" y="4" width="2" height="3" fill="#B0B0B0"/>
  <rect x="22" y="4" width="2" height="3" fill="#B0B0B0"/>
  <!-- Head -->
  <rect x="7" y="7" width="18" height="12" rx="2" fill="#B0B0B0"/>
  <!-- Black mask -->
  <rect x="9" y="10" width="6" height="4" rx="1" fill="#3D3D3D"/>
  <rect x="17" y="10" width="6" height="4" rx="1" fill="#3D3D3D"/>
  <!-- Eyes (white in mask) -->
  <rect x="11" y="11" width="2" height="2" fill="#FFFFFF"/>
  <rect x="19" y="11" width="2" height="2" fill="#FFFFFF"/>
  <rect x="12" y="11" width="1" height="2" fill="#1A1A2E"/>
  <rect x="20" y="11" width="1" height="2" fill="#1A1A2E"/>
  <!-- White muzzle -->
  <rect x="13" y="13" width="6" height="4" rx="1" fill="#E8E8E8"/>
  <!-- Nose -->
  <rect x="15" y="14" width="2" height="2" fill="#3D3D3D"/>
  <!-- Body -->
  <rect x="9" y="19" width="14" height="8" rx="2" fill="#B0B0B0"/>
  <!-- Belly -->
  <rect x="12" y="20" width="8" height="5" fill="#D8D8D8"/>
  <!-- Feet -->
  <rect x="9" y="27" width="4" height="2" fill="#3D3D3D"/>
  <rect x="19" y="27" width="4" height="2" fill="#3D3D3D"/>
  <!-- Tail (striped) -->
  <rect x="23" y="21" width="4" height="2" fill="#B0B0B0"/>
  <rect x="24" y="23" width="4" height="2" fill="#3D3D3D"/>
  <rect x="25" y="25" width="3" height="2" fill="#B0B0B0"/>
</svg>