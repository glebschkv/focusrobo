<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="128" height="128" shape-rendering="crispEdges">
  <!-- Phoenix pixel art - red/orange firebird -->
  <!-- Crest flames -->
  <rect x="12" y="0" width="2" height="3" fill="#FFD93D"/>
  <rect x="14" y="1" width="2" height="3" fill="#FF9F43"/>
  <rect x="16" y="0" width="2" height="2" fill="#EF4444"/>
  <rect x="18" y="1" width="2" height="3" fill="#FFD93D"/>
  <rect x="10" y="1" width="2" height="2" fill="#FF9F43"/>
  <!-- Head -->
  <rect x="9" y="3" width="14" height="10" rx="2" fill="#EF4444"/>
  <!-- Face -->
  <rect x="11" y="5" width="10" height="6" rx="1" fill="#FF9F43"/>
  <!-- Eyes -->
  <rect x="12" y="7" width="2" height="2" fill="#FFD93D"/>
  <rect x="13" y="7" width="1" height="1" fill="#1A1A2E"/>
  <rect x="18" y="7" width="2" height="2" fill="#FFD93D"/>
  <rect x="19" y="7" width="1" height="1" fill="#1A1A2E"/>
  <!-- Beak -->
  <rect x="14" y="10" width="4" height="2" fill="#D4A017"/>
  <rect x="15" y="12" width="2" height="1" fill="#D4A017"/>
  <!-- Body -->
  <rect x="9" y="13" width="14" height="9" rx="2" fill="#EF4444"/>
  <!-- Chest glow -->
  <rect x="12" y="14" width="8" height="5" rx="1" fill="#FF9F43"/>
  <rect x="14" y="15" width="4" height="3" fill="#FFD93D"/>
  <!-- Wings -->
  <rect x="3" y="13" width="6" height="4" rx="1" fill="#FF9F43"/>
  <rect x="2" y="17" width="5" height="3" fill="#EF4444"/>
  <rect x="1" y="20" width="4" height="2" fill="#FFD93D"/>
  <rect x="23" y="13" width="6" height="4" rx="1" fill="#FF9F43"/>
  <rect x="25" y="17" width="5" height="3" fill="#EF4444"/>
  <rect x="27" y="20" width="4" height="2" fill="#FFD93D"/>
  <!-- Tail feathers -->
  <rect x="11" y="22" width="3" height="4" fill="#FF9F43"/>
  <rect x="14" y="22" width="4" height="6" fill="#EF4444"/>
  <rect x="18" y="22" width="3" height="4" fill="#FF9F43"/>
  <rect x="12" y="26" width="2" height="3" fill="#FFD93D"/>
  <rect x="18" y="26" width="2" height="3" fill="#FFD93D"/>
  <rect x="15" y="28" width="2" height="2" fill="#FFD93D"/>
  <!-- Feet -->
  <rect x="12" y="22" width="2" height="2" fill="#D4A017"/>
  <rect x="18" y="22" width="2" height="2" fill="#D4A017"/>
</svg>