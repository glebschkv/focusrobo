<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="128" height="128" shape-rendering="crispEdges">
  <!-- Crane pixel art - Japanese red-crowned crane -->
  <!-- Red crown -->
  <rect x="13" y="2" width="6" height="3" rx="1" fill="#EF4444"/>
  <!-- Head -->
  <rect x="10" y="4" width="12" height="8" rx="2" fill="#FFFFFF"/>
  <!-- Black face markings -->
  <rect x="10" y="8" width="3" height="3" fill="#2C2C3A"/>
  <rect x="19" y="8" width="3" height="3" fill="#2C2C3A"/>
  <!-- Eyes -->
  <rect x="12" y="7" width="2" height="2" fill="#1A1A2E"/>
  <rect x="18" y="7" width="2" height="2" fill="#1A1A2E"/>
  <!-- Beak -->
  <rect x="14" y="10" width="4" height="2" fill="#B0956E"/>
  <rect x="15" y="12" width="2" height="2" fill="#B0956E"/>
  <!-- Neck -->
  <rect x="13" y="12" width="6" height="5" fill="#FFFFFF"/>
  <rect x="12" y="13" width="2" height="3" fill="#2C2C3A"/>
  <rect x="18" y="13" width="2" height="3" fill="#2C2C3A"/>
  <!-- Body -->
  <rect x="8" y="17" width="16" height="8" rx="2" fill="#FFFFFF"/>
  <!-- Wing feathers (black tips) -->
  <rect x="5" y="18" width="4" height="6" rx="1" fill="#2C2C3A"/>
  <rect x="23" y="18" width="4" height="6" rx="1" fill="#2C2C3A"/>
  <!-- Tail feathers -->
  <rect x="11" y="25" width="4" height="3" fill="#2C2C3A"/>
  <rect x="17" y="25" width="4" height="3" fill="#2C2C3A"/>
  <!-- Legs -->
  <rect x="13" y="25" width="1" height="4" fill="#6B7280"/>
  <rect x="18" y="25" width="1" height="4" fill="#6B7280"/>
  <!-- Feet -->
  <rect x="11" y="29" width="4" height="1" fill="#6B7280"/>
  <rect x="17" y="29" width="4" height="1" fill="#6B7280"/>
</svg>