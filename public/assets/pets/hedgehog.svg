<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="128" height="128" shape-rendering="crispEdges">
  <!-- Hedgehog pixel art -->
  <!-- Spikes top row -->
  <rect x="8" y="4" width="2" height="3" fill="#8B6914"/>
  <rect x="11" y="3" width="2" height="3" fill="#6B4F12"/>
  <rect x="14" y="2" width="2" height="3" fill="#8B6914"/>
  <rect x="17" y="3" width="2" height="3" fill="#6B4F12"/>
  <rect x="20" y="4" width="2" height="3" fill="#8B6914"/>
  <!-- Spikes second row -->
  <rect x="6" y="6" width="2" height="3" fill="#6B4F12"/>
  <rect x="10" y="5" width="2" height="3" fill="#A07828"/>
  <rect x="13" y="5" width="2" height="2" fill="#6B4F12"/>
  <rect x="16" y="5" width="2" height="2" fill="#A07828"/>
  <rect x="19" y="5" width="2" height="3" fill="#6B4F12"/>
  <rect x="23" y="6" width="2" height="3" fill="#8B6914"/>
  <!-- Head/back -->
  <rect x="7" y="8" width="18" height="10" rx="2" fill="#A07828"/>
  <!-- Face -->
  <rect x="10" y="9" width="12" height="9" rx="2" fill="#E8C99A"/>
  <!-- Eyes -->
  <rect x="12" y="11" width="2" height="2" fill="#3D2C2C"/>
  <rect x="18" y="11" width="2" height="2" fill="#3D2C2C"/>
  <!-- Nose -->
  <rect x="15" y="14" width="2" height="2" rx="1" fill="#3D2C2C"/>
  <!-- Cheeks -->
  <rect x="11" y="14" width="2" height="2" fill="#F5B0C3" opacity="0.5"/>
  <rect x="19" y="14" width="2" height="2" fill="#F5B0C3" opacity="0.5"/>
  <!-- Body -->
  <rect x="9" y="18" width="14" height="8" rx="2" fill="#A07828"/>
  <!-- Belly -->
  <rect x="12" y="19" width="8" height="6" rx="1" fill="#E8C99A"/>
  <!-- Feet -->
  <rect x="10" y="26" width="4" height="2" fill="#8B6914"/>
  <rect x="18" y="26" width="4" height="2" fill="#8B6914"/>
</svg>