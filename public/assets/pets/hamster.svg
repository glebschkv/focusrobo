<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="128" height="128" shape-rendering="crispEdges">
  <!-- Hamster pixel art -->
  <!-- Ears -->
  <rect x="8" y="5" width="4" height="4" rx="1" fill="#C47A3A"/>
  <rect x="20" y="5" width="4" height="4" rx="1" fill="#C47A3A"/>
  <rect x="9" y="6" width="2" height="2" fill="#F5B0C3"/>
  <rect x="21" y="6" width="2" height="2" fill="#F5B0C3"/>
  <!-- Head -->
  <rect x="7" y="8" width="18" height="12" rx="3" fill="#E8A04C"/>
  <!-- Face patch -->
  <rect x="11" y="10" width="10" height="8" rx="2" fill="#FFF0D4"/>
  <!-- Eyes -->
  <rect x="11" y="11" width="2" height="2" fill="#3D2C2C"/>
  <rect x="19" y="11" width="2" height="2" fill="#3D2C2C"/>
  <!-- Nose -->
  <rect x="15" y="14" width="2" height="2" fill="#C47A3A"/>
  <!-- Cheeks -->
  <rect x="8" y="13" width="3" height="3" fill="#F5C48A" rx="1"/>
  <rect x="21" y="13" width="3" height="3" fill="#F5C48A" rx="1"/>
  <!-- Body -->
  <rect x="9" y="20" width="14" height="8" rx="3" fill="#E8A04C"/>
  <!-- Belly -->
  <rect x="12" y="21" width="8" height="5" rx="1" fill="#FFF0D4"/>
  <!-- Feet -->
  <rect x="10" y="28" width="4" height="2" fill="#C47A3A"/>
  <rect x="18" y="28" width="4" height="2" fill="#C47A3A"/>
</svg>