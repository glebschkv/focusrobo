<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="128" height="128" shape-rendering="crispEdges">
  <!-- Owl pixel art -->
  <!-- Ear tufts -->
  <rect x="7" y="2" width="3" height="4" fill="#8B6340"/>
  <rect x="22" y="2" width="3" height="4" fill="#8B6340"/>
  <!-- Head -->
  <rect x="7" y="5" width="18" height="14" rx="3" fill="#A07828"/>
  <!-- Eye rings -->
  <rect x="9" y="8" width="6" height="6" rx="3" fill="#E8C99A"/>
  <rect x="17" y="8" width="6" height="6" rx="3" fill="#E8C99A"/>
  <!-- Eyes -->
  <rect x="11" y="9" width="3" height="4" rx="1" fill="#FFD93D"/>
  <rect x="18" y="9" width="3" height="4" rx="1" fill="#FFD93D"/>
  <!-- Pupils -->
  <rect x="12" y="10" width="2" height="2" fill="#1A1A2E"/>
  <rect x="19" y="10" width="2" height="2" fill="#1A1A2E"/>
  <!-- Beak -->
  <rect x="14" y="14" width="4" height="3" fill="#E8A04C"/>
  <rect x="15" y="17" width="2" height="1" fill="#E8A04C"/>
  <!-- Body -->
  <rect x="9" y="19" width="14" height="8" rx="2" fill="#A07828"/>
  <!-- Chest pattern -->
  <rect x="12" y="19" width="8" height="6" rx="1" fill="#E8C99A"/>
  <!-- Chest spots -->
  <rect x="13" y="20" width="2" height="1" fill="#C4A060"/>
  <rect x="17" y="20" width="2" height="1" fill="#C4A060"/>
  <rect x="14" y="22" width="2" height="1" fill="#C4A060"/>
  <rect x="16" y="22" width="2" height="1" fill="#C4A060"/>
  <!-- Wings -->
  <rect x="5" y="19" width="4" height="6" rx="1" fill="#8B6340"/>
  <rect x="23" y="19" width="4" height="6" rx="1" fill="#8B6340"/>
  <!-- Feet -->
  <rect x="11" y="27" width="3" height="2" fill="#E8A04C"/>
  <rect x="18" y="27" width="3" height="2" fill="#E8A04C"/>
</svg>