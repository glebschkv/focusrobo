<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="128" height="128" shape-rendering="crispEdges">
  <!-- Unicorn pixel art - white with rainbow horn -->
  <!-- Horn (rainbow) -->
  <rect x="15" y="0" width="2" height="2" fill="#EF4444"/>
  <rect x="15" y="2" width="2" height="2" fill="#FF9F43"/>
  <rect x="15" y="4" width="2" height="2" fill="#FFD93D"/>
  <!-- Ears -->
  <rect x="10" y="4" width="3" height="4" fill="#FFFFFF"/>
  <rect x="19" y="4" width="3" height="4" fill="#FFFFFF"/>
  <rect x="11" y="5" width="1" height="2" fill="#F5B0C3"/>
  <rect x="20" y="5" width="1" height="2" fill="#F5B0C3"/>
  <!-- Head -->
  <rect x="8" y="7" width="16" height="12" rx="2" fill="#FFFFFF"/>
  <!-- Mane (rainbow) -->
  <rect x="6" y="6" width="2" height="3" fill="#EF4444"/>
  <rect x="5" y="9" width="2" height="3" fill="#FF9F43"/>
  <rect x="6" y="12" width="2" height="3" fill="#FFD93D"/>
  <rect x="5" y="15" width="2" height="3" fill="#4ADE80"/>
  <rect x="6" y="18" width="2" height="2" fill="#60A5FA"/>
  <rect x="24" y="6" width="2" height="3" fill="#A78BFA"/>
  <rect x="25" y="9" width="2" height="3" fill="#60A5FA"/>
  <rect x="24" y="12" width="2" height="3" fill="#4ADE80"/>
  <!-- Eyes -->
  <rect x="12" y="11" width="3" height="3" fill="#A78BFA"/>
  <rect x="13" y="12" width="1" height="1" fill="#1A1A2E"/>
  <rect x="17" y="11" width="3" height="3" fill="#A78BFA"/>
  <rect x="18" y="12" width="1" height="1" fill="#1A1A2E"/>
  <!-- Nose -->
  <rect x="15" y="15" width="2" height="1" fill="#F5B0C3"/>
  <!-- Cheeks -->
  <rect x="10" y="14" width="2" height="2" fill="#FFD4DE" opacity="0.5"/>
  <rect x="20" y="14" width="2" height="2" fill="#FFD4DE" opacity="0.5"/>
  <!-- Body -->
  <rect x="9" y="19" width="14" height="8" rx="2" fill="#FFFFFF"/>
  <!-- Sparkle accents -->
  <rect x="11" y="20" width="1" height="1" fill="#FFD93D" opacity="0.7"/>
  <rect x="19" y="22" width="1" height="1" fill="#A78BFA" opacity="0.7"/>
  <rect x="14" y="24" width="1" height="1" fill="#F5B0C3" opacity="0.7"/>
  <!-- Feet -->
  <rect x="10" y="27" width="4" height="2" fill="#F0E6FF"/>
  <rect x="18" y="27" width="4" height="2" fill="#F0E6FF"/>
  <!-- Tail (rainbow) -->
  <rect x="23" y="20" width="3" height="2" fill="#EF4444"/>
  <rect x="24" y="22" width="3" height="2" fill="#FFD93D"/>
  <rect x="25" y="24" width="3" height="2" fill="#60A5FA"/>
</svg>