<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="128" height="128" shape-rendering="crispEdges">
  <!-- Dragon pixel art - green baby dragon -->
  <!-- Horns -->
  <rect x="8" y="2" width="2" height="3" fill="#D4A017"/>
  <rect x="22" y="2" width="2" height="3" fill="#D4A017"/>
  <!-- Head -->
  <rect x="7" y="5" width="18" height="12" rx="2" fill="#4ADE80"/>
  <!-- Snout -->
  <rect x="11" y="10" width="10" height="6" rx="1" fill="#86EFAC"/>
  <!-- Eyes -->
  <rect x="10" y="8" width="3" height="3" fill="#FFD93D"/>
  <rect x="19" y="8" width="3" height="3" fill="#FFD93D"/>
  <rect x="11" y="9" width="1" height="1" fill="#1A1A2E"/>
  <rect x="20" y="9" width="1" height="1" fill="#1A1A2E"/>
  <!-- Nostrils -->
  <rect x="13" y="12" width="2" height="1" fill="#22C55E"/>
  <rect x="17" y="12" width="2" height="1" fill="#22C55E"/>
  <!-- Mouth -->
  <rect x="14" y="14" width="4" height="1" fill="#22C55E"/>
  <!-- Body -->
  <rect x="9" y="17" width="14" height="9" rx="2" fill="#4ADE80"/>
  <!-- Belly -->
  <rect x="12" y="18" width="8" height="6" rx="1" fill="#86EFAC"/>
  <!-- Belly scales -->
  <rect x="13" y="19" width="6" height="1" fill="#BBF7D0"/>
  <rect x="14" y="21" width="4" height="1" fill="#BBF7D0"/>
  <rect x="13" y="23" width="6" height="1" fill="#BBF7D0"/>
  <!-- Wings -->
  <rect x="3" y="15" width="5" height="3" fill="#22C55E"/>
  <rect x="4" y="18" width="4" height="3" fill="#22C55E"/>
  <rect x="5" y="21" width="3" height="2" fill="#22C55E"/>
  <rect x="24" y="15" width="5" height="3" fill="#22C55E"/>
  <rect x="24" y="18" width="4" height="3" fill="#22C55E"/>
  <rect x="24" y="21" width="3" height="2" fill="#22C55E"/>
  <!-- Feet -->
  <rect x="10" y="26" width="4" height="2" fill="#22C55E"/>
  <rect x="18" y="26" width="4" height="2" fill="#22C55E"/>
  <!-- Tail -->
  <rect x="23" y="22" width="4" height="2" rx="1" fill="#4ADE80"/>
  <rect x="26" y="21" width="2" height="2" fill="#22C55E"/>
</svg>