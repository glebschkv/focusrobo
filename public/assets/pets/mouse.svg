<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="128" height="128" shape-rendering="crispEdges">
  <!-- Mouse pixel art -->
  <!-- Ears -->
  <rect x="6" y="4" width="6" height="6" rx="3" fill="#B0B0B0"/>
  <rect x="20" y="4" width="6" height="6" rx="3" fill="#B0B0B0"/>
  <rect x="7" y="5" width="4" height="4" rx="2" fill="#F5B0C3"/>
  <rect x="21" y="5" width="4" height="4" rx="2" fill="#F5B0C3"/>
  <!-- Head -->
  <rect x="8" y="9" width="16" height="11" rx="2" fill="#C8C8C8"/>
  <!-- Eyes -->
  <rect x="12" y="12" width="2" height="2" fill="#1A1A2E"/>
  <rect x="18" y="12" width="2" height="2" fill="#1A1A2E"/>
  <!-- Nose -->
  <rect x="15" y="15" width="2" height="2" rx="1" fill="#F5B0C3"/>
  <!-- Whiskers -->
  <rect x="6" y="15" width="5" height="1" fill="#999"/>
  <rect x="6" y="17" width="4" height="1" fill="#999"/>
  <rect x="21" y="15" width="5" height="1" fill="#999"/>
  <rect x="22" y="17" width="4" height="1" fill="#999"/>
  <!-- Body -->
  <rect x="10" y="20" width="12" height="7" rx="2" fill="#C8C8C8"/>
  <!-- Belly -->
  <rect x="13" y="21" width="6" height="4" fill="#E8E8E8"/>
  <!-- Feet -->
  <rect x="10" y="27" width="4" height="2" fill="#F5B0C3"/>
  <rect x="18" y="27" width="4" height="2" fill="#F5B0C3"/>
  <!-- Tail -->
  <rect x="22" y="24" width="4" height="1" fill="#F5B0C3"/>
  <rect x="25" y="25" width="3" height="1" fill="#F5B0C3"/>
  <rect x="27" y="26" width="2" height="1" fill="#F5B0C3"/>
</svg>