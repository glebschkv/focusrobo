<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>PhoNo</title>
    <meta name="description" content="Stay focused, grow your island. PhoNo rewards you for putting down your phone with adorable pets and achievements." />
    <meta name="author" content="PhoNo" />
    <meta name="apple-mobile-web-app-title" content="PhoNo" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#6BB8E0" />

    <meta property="og:title" content="PhoNo - Focus Timer & Pet Rewards" />
    <meta property="og:description" content="Stay focused, grow your island. PhoNo rewards you for putting down your phone with adorable pets and achievements." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://phonoinc.com" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="PhoNo - Focus Timer & Pet Rewards" />
    <meta name="twitter:description" content="Stay focused, grow your island. PhoNo rewards you for putting down your phone." />

    <!-- CSP: mitigate XSS and injection attacks -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' https://*.supabase.co wss://*.supabase.co; frame-src 'none'; object-src 'none'; base-uri 'self';">
  </head>

  <body style="background: #A5D8EF;">
    <!-- Inline splash screen shown instantly while WKWebView cold-starts and
         React loads. Lives OUTSIDE #root so React's createRoot() doesn't destroy
         it. Removed by App.tsx useEffect after React mounts with a fade-out. -->
    <div id="splash-screen" style="
      position: fixed; inset: 0; z-index: 9999;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: linear-gradient(180deg, #6BB8E0 0%, #A5D8EF 35%, #D0EAF5 65%, #EEF4F0 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', 'Segoe UI', sans-serif;
      overflow: hidden;
      transition: opacity 0.4s ease-out;
    ">
      <!-- Sun glow -->
      <div style="
        position: absolute; top: 8%; right: 12%;
        width: 24px; height: 24px; border-radius: 50%;
        background: radial-gradient(circle, #FFFFFF 0%, #FFFDE7 20%, #FFF3C4 40%, rgba(255,224,130,0.4) 65%, transparent 100%);
        box-shadow: 0 0 12px 4px rgba(255,250,230,0.8), 0 0 30px 12px rgba(255,220,100,0.3), 0 0 60px 24px rgba(255,200,80,0.12);
        pointer-events: none;
        animation: splash-sun-breathe 5s ease-in-out infinite;
      "></div>

      <!-- Clouds -->
      <div style="
        position: absolute; top: 14%; left: 8%;
        width: 80px; height: 24px; border-radius: 40px;
        background: rgba(255,255,255,0.65); filter: blur(1px);
        pointer-events: none;
        animation: splash-cloud-drift 8s ease-in-out infinite alternate;
      "></div>
      <div style="
        position: absolute; top: 22%; right: 15%;
        width: 56px; height: 18px; border-radius: 30px;
        background: rgba(255,255,255,0.5); filter: blur(1px);
        pointer-events: none;
        animation: splash-cloud-drift 10s ease-in-out infinite alternate-reverse;
      "></div>

      <!-- Content wrapper with entrance animation -->
      <div style="animation: splash-entrance 0.7s ease-out 0.05s both;">
        <!-- Island silhouette SVG -->
        <div style="display: flex; justify-content: center; margin-bottom: 32px; animation: splash-island-rise 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s both;">
          <svg width="140" height="96" viewBox="0 0 160 110" fill="none">
            <polygon points="80,8 152,48 80,88 8,48" fill="#7CB97A"/>
            <polygon points="80,28 116,48 80,68 44,48" fill="#8AC888" opacity="0.5"/>
            <polygon points="8,48 80,88 80,108 8,68" fill="#8B6B4A"/>
            <polygon points="152,48 80,88 80,108 152,68" fill="#A0805C"/>
          </svg>
        </div>

        <!-- App name -->
        <div style="
          font-size: 24px; font-weight: 700; letter-spacing: 1.5px;
          color: #1C211E; text-align: center; margin-bottom: 4px;
        ">PhoNo</div>

        <!-- Tagline -->
        <div style="
          font-size: 11px; font-weight: 500; letter-spacing: 3px; text-transform: uppercase;
          color: rgba(28, 33, 30, 0.45); margin-bottom: 40px; text-align: center;
        ">Focus &middot; Grow &middot; Collect</div>

        <!-- Egg loading indicator -->
        <div style="display: flex; justify-content: center;">
          <div style="animation: splash-egg-rock 1.5s ease-in-out infinite;">
            <div style="
              width: 20px; height: 26px;
              background: linear-gradient(180deg, #E8F5E1 0%, #C5DFB8 40%, #A8C99B 100%);
              border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
              box-shadow: 0 2px 6px rgba(64,133,106,0.2);
              border: 1px solid rgba(64,133,106,0.15);
            "></div>
          </div>
        </div>
      </div>

      <style>
        @keyframes splash-sun-breathe {
          0%, 100% {
            box-shadow: 0 0 12px 4px rgba(255,250,230,0.8), 0 0 30px 12px rgba(255,220,100,0.3), 0 0 60px 24px rgba(255,200,80,0.12);
          }
          50% {
            box-shadow: 0 0 16px 6px rgba(255,250,230,0.9), 0 0 36px 16px rgba(255,220,100,0.35), 0 0 72px 30px rgba(255,200,80,0.15);
          }
        }
        @keyframes splash-cloud-drift {
          0% { transform: translateX(-20px); }
          100% { transform: translateX(20px); }
        }
        @keyframes splash-entrance {
          0% { opacity: 0; transform: translateY(20px); }
          100% { opacity: 1; transform: translateY(0); }
        }
        @keyframes splash-island-rise {
          0% { transform: translateY(30px); opacity: 0; }
          60% { transform: translateY(-4px); opacity: 1; }
          80% { transform: translateY(2px); }
          100% { transform: translateY(0); opacity: 1; }
        }
        @keyframes splash-egg-rock {
          0%, 100% { transform: rotate(0deg); }
          25% { transform: rotate(8deg); }
          75% { transform: rotate(-8deg); }
        }
        @media (prefers-reduced-motion: reduce) {
          * { animation-duration: 0.01ms !important; }
        }
      </style>
    </div>

    <div id="root" style="background: #EEF4F0; min-height: 100vh;"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
